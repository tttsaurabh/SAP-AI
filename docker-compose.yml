version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sap_ai_postgres
    restart: always
    environment:
      POSTGRES_USER: sapadmin
      POSTGRES_PASSWORD: sappassword
      POSTGRES_DB: sap_knowledge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sap_ai_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: sap_ai_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
