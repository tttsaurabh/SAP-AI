services:
  - type: web
    name: sap-ai-backend
    runtime: python
    rootDir: backend
    plan: standard # torch/transformers/sentence-transformers need ~2GB RAM; free/starter tiers will likely OOM
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: APP_NAME
        value: "SAP Knowledge AI Assistant"
      - key: DEBUG
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "120"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:3000,http://127.0.0.1:3000,https://mdgbuddy.vercel.app"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: "gemini-3.1-flash-lite"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
      - key: ANTHROPIC_MODEL
        value: "claude-3-5-sonnet-latest"
      - key: LLM_TIMEOUT_SECONDS
        value: "10.0"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: UPLOADS_DIR
        value: "./uploads"
      - key: OCR_ENABLED
        value: "false"
      - key: EMBEDDING_MODEL
        value: "local:sentence-transformers/all-MiniLM-L6-v2"
      - key: RERANK_ENABLED
        value: "false"
      - key: RERANK_MODEL
        value: ""
      - key: VECTOR_DB_BACKEND
        value: "supabase"
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: "sap-knowledge"
      - key: PDF_PARSER_ENGINE
        value: "pymupdf"
