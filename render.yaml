services:
  - type: web
    name: sap-ai-backend
    runtime: python
    rootDir: backend
    plan: standard # torch/transformers/sentence-transformers need ~2GB RAM; free/starter tiers will likely OOM
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: APP_NAME
        value: "SAP Knowledge AI Assistant"
      - key: DEBUG
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "120"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:3000,http://127.0.0.1:3000,https://mdgbuddy.vercel.app,https://sapmdg.vercel.app"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: "gemini-2.0-flash-lite"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
      - key: ANTHROPIC_MODEL
        value: "claude-3-haiku-20240307"
      - key: LLM_TIMEOUT_SECONDS
        value: "25.0"
      - key: CHAT_PREWARM_ENABLED
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: UPLOADS_DIR
        value: "./uploads"
      - key: OCR_ENABLED
        value: "false"
      - key: EMBEDDING_MODEL
        value: "gemini:gemini-embedding-001"
      - key: EMBEDDING_DIMENSION
        value: "768"
      - key: RERANK_ENABLED
        value: "false"
      - key: RERANK_MODEL
        value: ""
      - key: RAG_CACHE_ENABLED
        value: "true"
      - key: RAG_CACHE_TTL_SECONDS
        value: "300"
      - key: RAG_CACHE_MAX_ENTRIES
        value: "128"
      - key: RAG_DEFAULT_TOP_K
        value: "3"
      - key: RAG_BROAD_TOP_K
        value: "5"
      - key: RAG_CONTEXT_CHARS_PER_CHUNK
        value: "1800"
      - key: VECTOR_DB_BACKEND
        value: "supabase"
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: "sap-knowledge"
      - key: PDF_PARSER_ENGINE
        value: "pymupdf"
